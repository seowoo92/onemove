<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" sizes="32x32" href="/onemove/favicon-32.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/onemove/favicon-180.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- PWA: 홈 화면 설치 (manifest만 — 푸시는 카카오 알림으로 대체) -->
    <link rel="manifest" href="/onemove/manifest.webmanifest" />
    <meta name="theme-color" content="#FAF6F0" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="오늘만큼" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" />
    <title>오늘만큼 — 오늘 할 수 있는 만큼만</title>
    <meta name="description" content="무기력한 날에도 오늘 할 수 있는 만큼만. AI 코치가 제안하는 나만의 회복 루틴." />

    <!-- OG 태그 (카카오톡·SNS 링크 공유 미리보기) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="오늘만큼" />
    <meta property="og:title" content="오늘만큼 — 오늘 할 수 있는 만큼만" />
    <meta property="og:description" content="무기력한 날에도 오늘 할 수 있는 만큼만. AI 코치가 제안하는 나만의 회복 루틴." />
    <meta property="og:image" content="https://seowoo92.github.io/onemove/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="오늘만큼 — 무기력한 날에도, 오늘 할 수 있는 만큼만" />
    <meta property="og:url" content="https://seowoo92.github.io/onemove/" />

    <!-- 트위터 카드 -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="오늘만큼 — 오늘 할 수 있는 만큼만" />
    <meta name="twitter:description" content="무기력한 날에도 오늘 할 수 있는 만큼만. AI 코치가 제안하는 나만의 회복 루틴." />
    <meta name="twitter:image" content="https://seowoo92.github.io/onemove/og-image.png" />
  </head>
  <body>
    <!-- 스플래시 스크린: 앱 코드 로드 전에 먼저 그려지는 브랜드 화면 (App이 준비되면 __hideSplash로 사라짐) -->
    <div id="splash" style="position:fixed;inset:0;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#FAF6F0;transition:opacity .45s ease;">
      <style>
        @keyframes splashBreathe { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.045); } }
        @media (prefers-reduced-motion: reduce) { #splash * { animation: none !important; } }
      </style>
      <div style="display:flex;align-items:center;animation:splashBreathe 2.2s ease-in-out infinite;">
        <div style="width:39px;height:39px;border-radius:50%;background:radial-gradient(circle at 34% 30%,#F6C6B4,#EFA58F 55%,#E08066);"></div>
        <div style="width:50px;height:50px;border-radius:50%;background:radial-gradient(circle at 34% 30%,#FFEFB6,#F3D978 55%,#E8C24E);margin-left:-15px;"></div>
        <div style="width:60px;height:60px;border-radius:50%;background:radial-gradient(circle at 38% 28%,#3C7A5C,#1C4030);margin-left:-15px;"></div>
      </div>
      <div style="margin-top:22px;font-family:'Pretendard Variable',-apple-system,sans-serif;font-size:33px;font-weight:800;color:#24523F;letter-spacing:-0.02em;">오늘만큼</div>
      <div style="margin-top:8px;font-family:'Pretendard Variable',-apple-system,sans-serif;font-size:19px;font-weight:500;color:#9AA69D;">오늘 할 수 있는 만큼만</div>
    </div>
    <script>
      window.__splashShownAt = Date.now();
      window.__hideSplash = function () {
        var el = document.getElementById('splash');
        if (!el) return;
        // 너무 짧게 번쩍이지 않도록 최소 노출 시간 확보
        var wait = Math.max(0, 600 - (Date.now() - window.__splashShownAt));
        setTimeout(function () {
          el.style.opacity = '0';
          setTimeout(function () { el.remove(); }, 500);
        }, wait);
      };
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
