<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">
<style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:"Pretendard Variable",Pretendard,sans-serif;-webkit-font-smoothing:antialiased}</style>
</helmet>
<div style="width:max-content;min-width:100%;min-height:100vh;box-sizing:border-box;padding:52px;background:#E6E1D6">
  <div style="font-size:24px;font-weight:800;color:#24523F;letter-spacing:-.02em">완료 버튼 — 노랑 톤 비교</div>
  <div style="font-size:14px;font-weight:500;color:#6f7d72;margin-top:6px">현재 톤(#F1DE93)과 더 연한 톤(#F7EBBE)을 같은 카드에서 비교.</div>
  <div style="display:flex;gap:48px;align-items:flex-start;margin-top:30px">

    <div style="flex:none;width:360px">
      <div style="font-size:13px;font-weight:600;color:#5a6b60;margin-bottom:12px">A — 현재 톤 (#F1DE93)</div>
      <div style="width:360px;background:#F9F6EE;border-radius:30px;padding:22px">
        <div style="background:#fff;border-radius:22px;padding:18px 19px;box-shadow:0 12px 24px -15px rgba(36,82,63,.22),inset 0 2px 0 rgba(255,255,255,.9)">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px">
            <div style="flex:1;min-width:0"><div style="font-size:17px;font-weight:700;color:#24523F">5분 동네 산책</div><div style="font-size:12.5px;font-weight:500;color:#7c8a80;margin-top:5px;line-height:1.5">햇볕과 걸음이 마음을 한결 가볍게 해요</div></div>
            <div style="flex:none;display:flex;gap:6px;align-items:center;margin-top:2px"><span style="font-size:11.5px;font-weight:700;color:#8a6a1a;background:#FBEFC8;border-radius:8px;padding:4px 9px;white-space:nowrap">보통</span><span style="font-size:11.5px;font-weight:600;color:#24523F;background:#D5EFD8;border-radius:8px;padding:4px 9px;white-space:nowrap">활력</span></div>
          </div>
          <div style="display:flex;gap:9px;margin-top:15px">
            <button style="flex:1;border:none;cursor:pointer;background:#F1DE93;color:#24523F;border-radius:14px;padding:13px;font-size:14.5px;font-weight:700;font-family:inherit;box-shadow:0 8px 16px -7px rgba(214,184,90,.5),inset 0 1px 0 rgba(255,255,255,.5)">완료</button>
            <button style="flex:1;border:none;cursor:pointer;background:#F1F5F0;color:#5c6960;border-radius:14px;padding:13px;font-size:14.5px;font-weight:600;font-family:inherit">지금은 어려워요</button>
          </div>
        </div>
      </div>
    </div>

    <div style="flex:none;width:360px">
      <div style="font-size:13px;font-weight:600;color:#5a6b60;margin-bottom:12px">B — 더 연한 톤 (#F7EBBE)</div>
      <div style="width:360px;background:#F9F6EE;border-radius:30px;padding:22px">
        <div style="background:#fff;border-radius:22px;padding:18px 19px;box-shadow:0 12px 24px -15px rgba(36,82,63,.22),inset 0 2px 0 rgba(255,255,255,.9)">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px">
            <div style="flex:1;min-width:0"><div style="font-size:17px;font-weight:700;color:#24523F">5분 동네 산책</div><div style="font-size:12.5px;font-weight:500;color:#7c8a80;margin-top:5px;line-height:1.5">햇볕과 걸음이 마음을 한결 가볍게 해요</div></div>
            <div style="flex:none;display:flex;gap:6px;align-items:center;margin-top:2px"><span style="font-size:11.5px;font-weight:700;color:#8a6a1a;background:#FBEFC8;border-radius:8px;padding:4px 9px;white-space:nowrap">보통</span><span style="font-size:11.5px;font-weight:600;color:#24523F;background:#D5EFD8;border-radius:8px;padding:4px 9px;white-space:nowrap">활력</span></div>
          </div>
          <div style="display:flex;gap:9px;margin-top:15px">
            <button style="flex:1;border:none;cursor:pointer;background:#F7EBBE;color:#24523F;border-radius:14px;padding:13px;font-size:14.5px;font-weight:700;font-family:inherit;box-shadow:0 8px 16px -7px rgba(214,184,90,.38),inset 0 1px 0 rgba(255,255,255,.6)">완료</button>
            <button style="flex:1;border:none;cursor:pointer;background:#F1F5F0;color:#5c6960;border-radius:14px;padding:13px;font-size:14.5px;font-weight:600;font-family:inherit">지금은 어려워요</button>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>
</x-dc>
</body>
</html>
